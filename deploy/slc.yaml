# Stack SLC no Docker Swarm — referência de publicação do repositório.
#
# Deploy: docker stack deploy -c deploy/slc.yaml slc
#
# Código Laravel: por defeito o bind de admin/ → /var/www/html (desenvolvimento até a app
# estar testada; depois remover esse mount e publicar o código na imagem PHP).
#
# Permissões PHP-FPM (imagem Alpine): www-data = uid/gid 82. Sem isto não há laravel.log e dá 500:
#   docker run --rm -v /srv/sistemas/slc/admin:/app alpine chown -R 82:82 /app/storage /app/bootstrap/cache
#   docker run --rm -v /srv/sistemas/slc/data/storage/app:/app alpine chown -R 82:82 /app
#
# HTTP: a imagem PHP é só PHP-FPM (:9000). O Traefik aponta para o serviço `api_nginx` (:80),
# que faz FastCGI para `slc_app:9000` (ver deploy/nginx/laravel-api.conf).
#
# Dados persistentes no HOST (bind mounts), não em volumes Docker nomeados.
# Criar no servidor (antes do primeiro deploy):
#   mkdir -p /srv/sistemas/slc/data/storage/app/public \
#            /srv/sistemas/slc/data/postgres \
#            /srv/sistemas/slc/data/redis
# Site estático: o serviço `frontend` monta frontend/dist (gerar com npm run build em frontend/).
#   chown -R <uid-php>:<gid-php> /srv/sistemas/slc/data/storage
#   chown -R 70:70 /srv/sistemas/slc/data/postgres    # postgres:16-alpine (uid=70)
#   chown -R 999:1000 /srv/sistemas/slc/data/redis     # redis:7-alpine (uid=999)
#
# Pré-requisitos:
#   - Rede overlay externa traefik-public (partilhada com o Traefik).
#   - Proxy Traefik com certresolver "le" (Let's Encrypt) nos entrypoints web/websecure.
#   - Secrets Swarm (nomes específicos desta app — não colidem com outras stacks no mesmo host):
#       slc_sousalima_db_password, slc_sousalima_app_key, slc_sousalima_jwt_secret,
#       slc_sousalima_smtp_password  (ver comentário "Secrets" no final do ficheiro).
#   - MAIL_USERNAME: endereço completo da caixa Microsoft 365 que envia (ex.: noreply@dominio).
#   - SMTP Microsoft 365: smtp.office365.com:587 TLS — password no secret (conta com SMTP
#     autenticado; MFA pode exigir password de aplicação — política Microsoft).
#
# Swarm: bind mounts são locais a cada nó; com replicas > 1, use o mesmo caminho em todos
# os nós ou NFS (ou reduza réplicas para serviços que partilham estes paths).

version: '3.9'

# Caminhos no host (ajuste uma vez; Laravel: storage/app e o mesmo ramo public/ em public/storage)
x-app-defaults: &app-defaults
  image: eolimabr/php8.4-sousalima-multitenant:latest
  working_dir: /var/www/html
  networks:
    - internal
  environment:
    APP_ENV: production
    APP_DEBUG: "false"
    # Erros também no stderr (docker service logs slc_app / slc_api_nginx)
    LOG_CHANNEL: stderr
    LOG_LEVEL: error
    # Fuso igual ao servidor (ajuste se necessário; no host: timedatectl)
    TZ: America/Sao_Paulo
    APP_TIMEZONE: America/Sao_Paulo
    APP_URL: https://api.sousalimaconsultoria.com.br
    TRUSTED_PROXIES: "*"
    FORCE_HTTPS: "true"
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_DATABASE: slc_admin
    DB_USERNAME: slc_user
    DB_PASSWORD_FILE: /run/secrets/slc_sousalima_db_password
    APP_KEY_FILE: /run/secrets/slc_sousalima_app_key
    JWT_SECRET_FILE: /run/secrets/slc_sousalima_jwt_secret
    # predis (PHP puro) — a imagem pode não ter extensão phpredis
    REDIS_CLIENT: predis
    REDIS_HOST: redis
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis
    # Microsoft 365 / Office 365 (SMTP autenticado)
    MAIL_MAILER: smtp
    MAIL_HOST: smtp.office365.com
    MAIL_PORT: "587"
    MAIL_USERNAME: "everton.lima@sousalimaconsultoria.com.br"
    MAIL_ENCRYPTION: tls
    MAIL_PASSWORD_FILE: /run/secrets/slc_sousalima_smtp_password
    MAIL_FROM_ADDRESS: noreply@sousalimaconsultoria.com.br
    MAIL_FROM_NAME: "Sousa Lima Consultoria"
    FILAMENT_ADMIN_EMAILS: "admin@sousalimaconsultoria.com.br,eolimabr@gmail.com"
    SESSION_SECURE_COOKIE: "true"
  secrets:
    - source: slc_sousalima_db_password
      target: /run/secrets/slc_sousalima_db_password
    - source: slc_sousalima_app_key
      target: /run/secrets/slc_sousalima_app_key
    - source: slc_sousalima_jwt_secret
      target: /run/secrets/slc_sousalima_jwt_secret
    - source: slc_sousalima_smtp_password
      target: /run/secrets/slc_sousalima_smtp_password
  volumes:
    # Código + vendor + .env no host (composer install em admin/ no servidor).
    # Remover esta entrada quando a app estiver estável e for empacotada na imagem.
    - type: bind
      source: /srv/sistemas/slc/admin
      target: /var/www/html
    # Sobrepõem só uploads/cache persistentes (restante de storage vem do repo).
    - type: bind
      source: /srv/sistemas/slc/data/storage/app
      target: /var/www/html/storage/app
    - type: bind
      source: /srv/sistemas/slc/data/storage/app/public
      target: /var/www/html/public/storage

# Healthcheck reutilizado nos serviços PHP (app, queue, scheduler)
x-healthcheck-php: &healthcheck-php
  test: ["CMD", "php", "artisan", "about"]
  interval: 30s
  timeout: 15s
  retries: 3
  start_period: 60s

# Healthcheck nginx (validação de configuração; não depende de index.html)
x-healthcheck-nginx: &healthcheck-nginx
  test: ["CMD-SHELL", "nginx -t"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

services:

  # ─── POSTGRESQL (persistência local no host) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      - internal
    environment:
      POSTGRES_DB: slc_admin
      POSTGRES_USER: slc_user
      POSTGRES_PASSWORD_FILE: /run/secrets/slc_sousalima_db_password
    secrets:
      - source: slc_sousalima_db_password
        target: /run/secrets/slc_sousalima_db_password
    volumes:
      - type: bind
        source: /srv/sistemas/slc/data/postgres
        target: /var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slc_user -d slc_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── REDIS (persistência local — AOF em /data) ─────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - internal
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --dir /data
    volumes:
      - type: bind
        source: /srv/sistemas/slc/data/redis
        target: /data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FRONTEND (ASTRO SSG) ──────────────────────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    networks:
      - traefik-public
    volumes:
      - type: bind
        source: /srv/sistemas/slc/frontend/dist
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: /srv/sistemas/slc/deploy/nginx/frontend-site.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    healthcheck: *healthcheck-nginx
    deploy:
      replicas: 3
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=traefik-public"
        # Canónico: só apex; www → 301 para https://sousalimaconsultoria.com.br (SEO)
        - "traefik.http.routers.slc-front.rule=Host(`sousalimaconsultoria.com.br`)"
        - "traefik.http.routers.slc-front.entrypoints=websecure"
        - "traefik.http.routers.slc-front.tls=true"
        - "traefik.http.routers.slc-front.tls.certresolver=le"
        - "traefik.http.services.slc-front.loadbalancer.server.port=80"
        - "traefik.http.routers.slc-front.middlewares=slc-headers"
        - "traefik.http.middlewares.slc-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.slc-headers.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.slc-headers.headers.frameDeny=true"
        - "traefik.http.routers.slc-front-www.rule=Host(`www.sousalimaconsultoria.com.br`)"
        - "traefik.http.routers.slc-front-www.entrypoints=websecure"
        - "traefik.http.routers.slc-front-www.tls=true"
        - "traefik.http.routers.slc-front-www.tls.certresolver=le"
        - "traefik.http.routers.slc-front-www.service=slc-front"
        - "traefik.http.routers.slc-front-www.middlewares=slc-www-to-apex"
        - "traefik.http.routers.slc-front-www.priority=20"
        - "traefik.http.middlewares.slc-www-to-apex.redirectregex.regex=^https?://www\\.sousalimaconsultoria\\.com\\.br(.*)$$"
        - "traefik.http.middlewares.slc-www-to-apex.redirectregex.replacement=https://sousalimaconsultoria.com.br$${1}"
        - "traefik.http.middlewares.slc-www-to-apex.redirectregex.permanent=true"

  # ─── STATIC ASSETS (mesmo diretório que storage/app/public no Laravel) ─────
  static:
    image: nginx:1.25-alpine
    networks:
      - traefik-public
    volumes:
      - type: bind
        source: /srv/sistemas/slc/data/storage/app/public
        target: /usr/share/nginx/html/storage
        read_only: true
    healthcheck: *healthcheck-nginx
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=traefik-public"
        - "traefik.http.routers.slc-static.rule=Host(`static.sousalimaconsultoria.com.br`)"
        - "traefik.http.routers.slc-static.entrypoints=websecure"
        - "traefik.http.routers.slc-static.tls=true"
        - "traefik.http.routers.slc-static.tls.certresolver=le"
        - "traefik.http.services.slc-static.loadbalancer.server.port=80"

  # ─── BACKEND API (PHP-FPM — sem HTTP; Traefik → api_nginx) ────────────────
  app:
    <<: *app-defaults
    healthcheck: *healthcheck-php
    deploy:
      replicas: 1

  # ─── Nginx → FastCGI para slc_app:9000 (HTTPS no Traefik) ─────────────────
  api_nginx:
    image: nginx:1.25-alpine
    networks:
      - internal
      - traefik-public
    volumes:
      - type: bind
        source: /srv/sistemas/slc/admin
        target: /var/www/html
        read_only: true
      - type: bind
        source: /srv/sistemas/slc/data/storage/app/public
        target: /var/www/html/public/storage
        read_only: true
      - type: bind
        source: /srv/sistemas/slc/deploy/nginx/laravel-api.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    healthcheck: *healthcheck-nginx
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=traefik-public"
        - "traefik.http.routers.slc-api.rule=Host(`api.sousalimaconsultoria.com.br`)"
        - "traefik.http.routers.slc-api.entrypoints=websecure"
        - "traefik.http.routers.slc-api.tls=true"
        - "traefik.http.routers.slc-api.tls.certresolver=le"
        - "traefik.http.services.slc-api.loadbalancer.server.port=80"

  # ─── WORKER (SEM EXPOSIÇÃO TRAEFIK) ──────────────────────────
  queue:
    <<: *app-defaults
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    healthcheck: *healthcheck-php
    deploy:
      replicas: 1

  # ─── SCHEDULER (CRON LARAVEL — 1 réplica) ────────────────────────────────
  scheduler:
    <<: *app-defaults
    command: php artisan schedule:work --verbose
    healthcheck: *healthcheck-php
    deploy:
      replicas: 1

networks:
  traefik-public:
    external: true
  internal:
    driver: overlay
    attachable: true

# Nomes no Swarm (docker secret create …) — prefixo slc_sousalima_ para identificar esta stack
secrets:
  slc_sousalima_db_password:
    external: true
  slc_sousalima_app_key:
    external: true
  slc_sousalima_jwt_secret:
    external: true
  slc_sousalima_smtp_password:
    external: true
