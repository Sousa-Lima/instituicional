# Site estático (Astro `dist/`) — serviço `frontend` em slc.yaml
# GET / sem index.html na raiz: com só `try_files $uri $uri/ ...`, o Nginx pode devolver
# 403 (directório sem listagem). Forçamos `/` → ficheiro `index.html` (404 se faltar).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
